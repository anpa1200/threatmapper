services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-threatmapper}
      POSTGRES_USER: ${DB_USER:-tm_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tm_user} -d ${DB_NAME:-threatmapper}"]
      interval: 5s
      timeout: 3s
      retries: 15
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - attck_data:/app/data/attck
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-tm_user}:${DB_PASS:-changeme}@postgres:5432/${DB_NAME:-threatmapper}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ATTCK_DOMAINS: ${ATTCK_DOMAINS:-enterprise-attack,mobile-attack,ics-attack}
      ATTCK_DATA_DIR: /app/data/attck
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - attck_data:/app/data/attck
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-tm_user}:${DB_PASS:-changeme}@postgres:5432/${DB_NAME:-threatmapper}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ATTCK_DATA_DIR: /app/data/attck
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-admin}
    depends_on:
      - redis
      - postgres

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - attck_data:/app/data/attck
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-tm_user}:${DB_PASS:-changeme}@postgres:5432/${DB_NAME:-threatmapper}
      REDIS_URL: redis://redis:6379/0
      ATTCK_DATA_DIR: /app/data/attck
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-admin}
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_API_URL: http://api:8000
      VITE_REFERENCE_URL: ${REFERENCE_URL:-http://localhost:3001/anomaly-detection-atlas}
    ports:
      - "3000:3000"
    depends_on:
      - api

  atlas-builder:
    build:
      context: .
      dockerfile: anomaly_detection/docs-site/Dockerfile
    restart: unless-stopped
    environment:
      ATLAS_REPOSITORY: ${ATLAS_REPOSITORY:-https://github.com/anpa1200/anomaly-detection-atlas.git}
      ATLAS_SYNC_INTERVAL: ${ATLAS_SYNC_INTERVAL:-3600}
    volumes:
      - atlas_site:/output

  atlas-docs:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - atlas_site:/usr/share/nginx/html:ro
      - ./anomaly_detection/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"
    depends_on:
      - atlas-builder

volumes:
  pg_data:
  attck_data:
  atlas_site:
