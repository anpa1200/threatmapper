services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/adversarygraph-postgres-entrypoint.sh"]
    command: ["postgres", "-c", "unix_socket_directories=/var/run/postgresql,/var/run/postgresql-shared"]
    environment:
      POSTGRES_DB: ${DB_NAME:-adversarygraph}
      POSTGRES_USER: ${DB_USER:-ag_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}:/var/lib/postgresql/data
      - pg_socket:/var/run/postgresql-shared
      - ./scripts/postgres-entrypoint.sh:/usr/local/bin/adversarygraph-postgres-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ag_user} -d ${DB_NAME:-adversarygraph}"]
      interval: 5s
      timeout: 3s
      retries: 15
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  db-apply-env-creds:
    image: postgres:16-alpine
    profiles: ["tools"]
    restart: "no"
    environment:
      POSTGRES_DB: ${DB_NAME:-adversarygraph}
      POSTGRES_USER: ${DB_USER:-ag_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - pg_socket:/var/run/postgresql-shared
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -lc
      - |
        psql -h /var/run/postgresql-shared -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" \
          -v user="$$POSTGRES_USER" -v pass="$$POSTGRES_PASSWORD" <<'SQL'
        ALTER USER :"user" WITH PASSWORD :'pass';
        SQL
        echo "Applied .env PostgreSQL password for role $$POSTGRES_USER"

  selftest:
    image: curlimages/curl:8.11.1
    restart: "no"
    depends_on:
      api:
        condition: service_started
    command:
      - sh
      - -lc
      - |
        set -eu
        max=120
        elapsed=0
        while [ "$$elapsed" -le "$$max" ]; do
          if response="$$(curl -fsS http://api:8000/api/system/selftest 2>/tmp/selftest.err)"; then
            echo "$$response"
            echo "$$response" | grep -q '"status":"ok"'
            echo "AdversaryGraph self-test passed."
            exit 0
          fi
          echo "Waiting for AdversaryGraph self-test ($$elapsed/$$max seconds): $$(cat /tmp/selftest.err 2>/dev/null || true)"
          sleep 3
          elapsed=$$((elapsed + 3))
        done
        echo "AdversaryGraph self-test timed out." >&2
        exit 1

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - attck_data:/app/data/attck
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-adversarygraph}
      DB_USER: ${DB_USER:-ag_user}
      DB_PASS: ${DB_PASS:-changeme}
      ADVERSARYGRAPH_DB_DIR: ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-local}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.1:8b}
      ATTCK_DOMAINS: ${ATTCK_DOMAINS:-enterprise-attack,mobile-attack,ics-attack,atlas}
      ATTCK_DATA_DIR: /app/data/attck
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      AUTO_IOC_FULL_SYNC_ON_STARTUP: ${AUTO_IOC_FULL_SYNC_ON_STARTUP:-true}
      AUTO_THREATFOX_SYNC_DAYS: ${AUTO_THREATFOX_SYNC_DAYS:-7}
      DYNAMIC_DB_SYNC_HOUR: ${DYNAMIC_DB_SYNC_HOUR:-3}
      DYNAMIC_DB_SYNC_MINUTE: ${DYNAMIC_DB_SYNC_MINUTE:-30}
      DYNAMIC_DB_IOC_SYNC_DAYS: ${DYNAMIC_DB_IOC_SYNC_DAYS:-7}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      OPENCTI_URL: ${OPENCTI_URL:-}
      OPENCTI_TOKEN: ${OPENCTI_TOKEN:-}
      OPENCTI_SYNC_LIMIT: ${OPENCTI_SYNC_LIMIT:-500}
      OPENCTI_VERIFY_TLS: ${OPENCTI_VERIFY_TLS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-admin}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - attck_data:/app/data/attck
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-adversarygraph}
      DB_USER: ${DB_USER:-ag_user}
      DB_PASS: ${DB_PASS:-changeme}
      ADVERSARYGRAPH_DB_DIR: ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-local}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.1:8b}
      ATTCK_DATA_DIR: /app/data/attck
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      AUTO_IOC_FULL_SYNC_ON_STARTUP: ${AUTO_IOC_FULL_SYNC_ON_STARTUP:-true}
      AUTO_THREATFOX_SYNC_DAYS: ${AUTO_THREATFOX_SYNC_DAYS:-7}
      DYNAMIC_DB_IOC_SYNC_DAYS: ${DYNAMIC_DB_IOC_SYNC_DAYS:-7}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      OPENCTI_URL: ${OPENCTI_URL:-}
      OPENCTI_TOKEN: ${OPENCTI_TOKEN:-}
      OPENCTI_SYNC_LIMIT: ${OPENCTI_SYNC_LIMIT:-500}
      OPENCTI_VERIFY_TLS: ${OPENCTI_VERIFY_TLS:-true}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-admin}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - attck_data:/app/data/attck
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-adversarygraph}
      DB_USER: ${DB_USER:-ag_user}
      DB_PASS: ${DB_PASS:-changeme}
      ADVERSARYGRAPH_DB_DIR: ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}
      REDIS_URL: redis://redis:6379/0
      ATTCK_DATA_DIR: /app/data/attck
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      OPENCTI_URL: ${OPENCTI_URL:-}
      OPENCTI_TOKEN: ${OPENCTI_TOKEN:-}
      OPENCTI_SYNC_LIMIT: ${OPENCTI_SYNC_LIMIT:-500}
      OPENCTI_VERIFY_TLS: ${OPENCTI_VERIFY_TLS:-true}
      DYNAMIC_DB_SYNC_HOUR: ${DYNAMIC_DB_SYNC_HOUR:-3}
      DYNAMIC_DB_SYNC_MINUTE: ${DYNAMIC_DB_SYNC_MINUTE:-30}
      DYNAMIC_DB_IOC_SYNC_DAYS: ${DYNAMIC_DB_IOC_SYNC_DAYS:-7}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-admin}
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_API_URL: http://api:8000
      VITE_REFERENCE_URL: ${REFERENCE_URL:-http://localhost:3001/anomaly-detection-atlas}
    ports:
      - "3000:3000"
    depends_on:
      - api

  atlas-builder:
    build:
      context: .
      dockerfile: anomaly_detection/docs-site/Dockerfile
    restart: unless-stopped
    environment:
      ATLAS_REPOSITORY: ${ATLAS_REPOSITORY:-https://github.com/anpa1200/anomaly-detection-atlas.git}
      ATLAS_SYNC_INTERVAL: ${ATLAS_SYNC_INTERVAL:-3600}
    volumes:
      - atlas_site:/output

  atlas-docs:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - atlas_site:/usr/share/nginx/html:ro
      - ./anomaly_detection/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"
    depends_on:
      - atlas-builder

volumes:
  pg_socket:
  attck_data:
  atlas_site:
