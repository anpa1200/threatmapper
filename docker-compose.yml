# Production compose file. For development, overlay the dev overrides:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# The dev override file re-adds --reload for the API, source bind-mounts for
# hot-reloading, and replaces the nginx frontend with the Vite dev server.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/adversarygraph-postgres-entrypoint.sh"]
    command: ["postgres", "-c", "unix_socket_directories=/var/run/postgresql,/var/run/postgresql-shared"]
    environment:
      POSTGRES_DB: ${DB_NAME:-adversarygraph}
      POSTGRES_USER: ${DB_USER:-ag_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}:/var/lib/postgresql/data
      - pg_socket:/var/run/postgresql-shared
      - ./scripts/postgres-entrypoint.sh:/usr/local/bin/adversarygraph-postgres-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ag_user} -d ${DB_NAME:-adversarygraph}"]
      interval: 5s
      timeout: 3s
      retries: 15
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  db-apply-env-creds:
    image: postgres:16-alpine
    profiles: ["tools"]
    restart: "no"
    environment:
      POSTGRES_DB: ${DB_NAME:-adversarygraph}
      POSTGRES_USER: ${DB_USER:-ag_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - pg_socket:/var/run/postgresql-shared
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -lc
      - |
        psql -h /var/run/postgresql-shared -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" \
          -v user="$$POSTGRES_USER" -v pass="$$POSTGRES_PASSWORD" <<'SQL'
        ALTER USER :"user" WITH PASSWORD :'pass';
        SQL
        echo "Applied .env PostgreSQL password for role $$POSTGRES_USER"

  selftest:
    image: curlimages/curl:8.11.1
    restart: "no"
    depends_on:
      api:
        condition: service_started
    command:
      - sh
      - -lc
      - |
        set -eu
        max=120
        elapsed=0
        while [ "$$elapsed" -le "$$max" ]; do
          if response="$$(curl -fsS http://api:8000/api/system/selftest 2>/tmp/selftest.err)"; then
            echo "$$response"
            echo "$$response" | grep -q '"status":"ok"'
            echo "AdversaryGraph self-test passed."
            exit 0
          fi
          echo "Waiting for AdversaryGraph self-test ($$elapsed/$$max seconds): $$(cat /tmp/selftest.err 2>/dev/null || true)"
          sleep 3
          elapsed=$$((elapsed + 3))
        done
        echo "AdversaryGraph self-test timed out." >&2
        exit 1

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  malwaregraph:
    build:
      context: .
      dockerfile: docker/malwaregraph/Dockerfile
    restart: unless-stopped
    environment:
      MALWAREGRAPH_STORAGE_DIR: /app/storage
      MALWAREGRAPH_API_KEY: ${MALWAREGRAPH_API_KEY:-}
      MALWAREGRAPH_RETENTION_DAYS: ${MALWAREGRAPH_RETENTION_DAYS:-7}
      MALWAREGRAPH_ENABLE_DYNAMIC_DEBUG: ${MALWAREGRAPH_ENABLE_DYNAMIC_DEBUG:-false}
      MALWAREGRAPH_LOG_LEVEL: ${MALWAREGRAPH_LOG_LEVEL:-info}
      MALWAREGRAPH_MAX_LOG_BYTES: ${MALWAREGRAPH_MAX_LOG_BYTES:-10485760}
      MALWAREGRAPH_LOG_BACKUP_COUNT: ${MALWAREGRAPH_LOG_BACKUP_COUNT:-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-local}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.1:8b}
      ADVERSARYGRAPH_LLM_PROXY_URL: http://api:8000/api/malwaregraph/llm/complete
      MALWAREGRAPH_AI_STRING_TIMEOUT_SECONDS: ${MALWAREGRAPH_AI_STRING_TIMEOUT_SECONDS:-180}
      MALWAREGRAPH_AI_STRING_PROMPT_MAX_CHARS: ${MALWAREGRAPH_AI_STRING_PROMPT_MAX_CHARS:-120000}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,nodev
    volumes:
      - malwaregraph_storage:/app/storage
    networks:
      - malwaregraph_internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/api/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  attack-lab-web:
    build:
      context: .
      dockerfile: docker/attack-lab-web/Dockerfile
    restart: unless-stopped
    environment:
      ATTACK_LAB_WEB_HOST: 127.0.0.1
      ATTACK_LAB_WEB_PORT: 8081
      ATTACK_LAB_WEB_LOG_DIR: /app/logs
    volumes:
      - adversarygraph_logs:/app/logs
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  attack-lab-endpoint:
    build:
      context: .
      dockerfile: docker/attack-lab-endpoint/Dockerfile
    restart: unless-stopped
    environment:
      ATTACK_LAB_ENDPOINT_HOST: 0.0.0.0
      ATTACK_LAB_ENDPOINT_PORT: 8090
      ATTACK_LAB_ENDPOINT_LOG_DIR: /app/logs
    volumes:
      - adversarygraph_logs:/app/logs
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  attck-data-permissions:
    image: busybox:1.36
    command: sh -c "mkdir -p /app/data/attck && chown -R 999:999 /app/data/attck && chmod -R u+rwX,g+rwX /app/data/attck"
    user: "0:0"
    volumes:
      - attck_data:/app/data/attck
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - attck_data:/app/data/attck
      - adversarygraph_logs:/app/logs
      - malwaregraph_storage:/malwaregraph-storage
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-adversarygraph}
      DB_USER: ${DB_USER:-ag_user}
      DB_PASS: ${DB_PASS:-changeme}
      ADVERSARYGRAPH_DB_DIR: ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-local}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.1:8b}
      ATTCK_DOMAINS: ${ATTCK_DOMAINS:-enterprise-attack,mobile-attack,ics-attack,atlas}
      ATTCK_DATA_DIR: /app/data/attck
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      AUTO_IOC_FULL_SYNC_ON_STARTUP: ${AUTO_IOC_FULL_SYNC_ON_STARTUP:-true}
      AUTO_THREATFOX_SYNC_DAYS: ${AUTO_THREATFOX_SYNC_DAYS:-7}
      DYNAMIC_DB_SYNC_HOUR: ${DYNAMIC_DB_SYNC_HOUR:-3}
      DYNAMIC_DB_SYNC_MINUTE: ${DYNAMIC_DB_SYNC_MINUTE:-30}
      DYNAMIC_DB_IOC_SYNC_DAYS: ${DYNAMIC_DB_IOC_SYNC_DAYS:-7}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      GREYNOISE_API_KEY: ${GREYNOISE_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      CENSYS_API_KEY: ${CENSYS_API_KEY:-}
      CENSYS_ORG_ID: ${CENSYS_ORG_ID:-}
      OPENCTI_URL: ${OPENCTI_URL:-}
      OPENCTI_TOKEN: ${OPENCTI_TOKEN:-}
      OPENCTI_SYNC_LIMIT: ${OPENCTI_SYNC_LIMIT:-500}
      OPENCTI_VERIFY_TLS: ${OPENCTI_VERIFY_TLS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      ATTACK_LAB_WEB_URL: ${ATTACK_LAB_WEB_URL:-http://attack-lab-web:8080}
      ATTACK_LAB_ENDPOINT_URL: ${ATTACK_LAB_ENDPOINT_URL:-http://attack-lab-endpoint:8090}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-10485760}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-5}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_SSO_MODE: ${AUTH_SSO_MODE:-proxy}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-viewer}
      AUTH_SESSION_MINUTES: ${AUTH_SESSION_MINUTES:-720}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-12}
      AUTH_PASSWORD_REQUIRE_UPPER: ${AUTH_PASSWORD_REQUIRE_UPPER:-false}
      AUTH_PASSWORD_REQUIRE_LOWER: ${AUTH_PASSWORD_REQUIRE_LOWER:-false}
      AUTH_PASSWORD_REQUIRE_NUMBER: ${AUTH_PASSWORD_REQUIRE_NUMBER:-false}
      AUTH_PASSWORD_REQUIRE_SPECIAL: ${AUTH_PASSWORD_REQUIRE_SPECIAL:-false}
      AUTH_MFA_ENABLED: ${AUTH_MFA_ENABLED:-false}
      AUTH_BOOTSTRAP_ADMIN_USERNAME: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
      PROXY_SECRET: ${PROXY_SECRET:-}
      MALWAREGRAPH_URL: http://malwaregraph:8100
      MALWAREGRAPH_API_KEY: ${MALWAREGRAPH_API_KEY:-}
      MALWAREGRAPH_STORAGE_DIR: /malwaregraph-storage
      MALWAREGRAPH_REQUEST_TIMEOUT_SECONDS: ${MALWAREGRAPH_REQUEST_TIMEOUT_SECONDS:-30}
      MALWAREGRAPH_UPLOAD_TIMEOUT_SECONDS: ${MALWAREGRAPH_UPLOAD_TIMEOUT_SECONDS:-180}
      MALWAREGRAPH_LONG_TIMEOUT_SECONDS: ${MALWAREGRAPH_LONG_TIMEOUT_SECONDS:-300}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      malwaregraph:
        condition: service_healthy
      attack-lab-web:
        condition: service_healthy
      attack-lab-endpoint:
        condition: service_healthy
      attck-data-permissions:
        condition: service_completed_successfully
    networks:
      - default
      - malwaregraph_internal
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
    # API is only reachable via the internal compose network (e.g. through the
    # frontend or a reverse proxy). Port 8000 is NOT published to the host.

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - attck_data:/app/data/attck
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-adversarygraph}
      DB_USER: ${DB_USER:-ag_user}
      DB_PASS: ${DB_PASS:-changeme}
      ADVERSARYGRAPH_DB_DIR: ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-local}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.1:8b}
      ATTCK_DATA_DIR: /app/data/attck
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      AUTO_IOC_FULL_SYNC_ON_STARTUP: ${AUTO_IOC_FULL_SYNC_ON_STARTUP:-true}
      AUTO_THREATFOX_SYNC_DAYS: ${AUTO_THREATFOX_SYNC_DAYS:-7}
      DYNAMIC_DB_IOC_SYNC_DAYS: ${DYNAMIC_DB_IOC_SYNC_DAYS:-7}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      GREYNOISE_API_KEY: ${GREYNOISE_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      CENSYS_API_KEY: ${CENSYS_API_KEY:-}
      CENSYS_ORG_ID: ${CENSYS_ORG_ID:-}
      OPENCTI_URL: ${OPENCTI_URL:-}
      OPENCTI_TOKEN: ${OPENCTI_TOKEN:-}
      OPENCTI_SYNC_LIMIT: ${OPENCTI_SYNC_LIMIT:-500}
      OPENCTI_VERIFY_TLS: ${OPENCTI_VERIFY_TLS:-true}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-viewer}
      AUTH_SESSION_MINUTES: ${AUTH_SESSION_MINUTES:-720}
      AUTH_BOOTSTRAP_ADMIN_USERNAME: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      attck-data-permissions:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - attck_data:/app/data/attck
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-adversarygraph}
      DB_USER: ${DB_USER:-ag_user}
      DB_PASS: ${DB_PASS:-changeme}
      ADVERSARYGRAPH_DB_DIR: ${ADVERSARYGRAPH_DB_DIR:-./data/postgres}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      ATTCK_DATA_DIR: /app/data/attck
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      GREYNOISE_API_KEY: ${GREYNOISE_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      CENSYS_API_KEY: ${CENSYS_API_KEY:-}
      CENSYS_ORG_ID: ${CENSYS_ORG_ID:-}
      OPENCTI_URL: ${OPENCTI_URL:-}
      OPENCTI_TOKEN: ${OPENCTI_TOKEN:-}
      OPENCTI_SYNC_LIMIT: ${OPENCTI_SYNC_LIMIT:-500}
      OPENCTI_VERIFY_TLS: ${OPENCTI_VERIFY_TLS:-true}
      DYNAMIC_DB_SYNC_HOUR: ${DYNAMIC_DB_SYNC_HOUR:-3}
      DYNAMIC_DB_SYNC_MINUTE: ${DYNAMIC_DB_SYNC_MINUTE:-30}
      DYNAMIC_DB_IOC_SYNC_DAYS: ${DYNAMIC_DB_IOC_SYNC_DAYS:-7}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_DEFAULT_ROLE: ${AUTH_DEFAULT_ROLE:-viewer}
      AUTH_SESSION_MINUTES: ${AUTH_SESSION_MINUTES:-720}
      AUTH_BOOTSTRAP_ADMIN_USERNAME: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      attck-data-permissions:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

  atlas-builder:
    build:
      context: .
      dockerfile: anomaly_detection/docs-site/Dockerfile
    restart: unless-stopped
    environment:
      ATLAS_REPOSITORY: ${ATLAS_REPOSITORY:-https://github.com/anpa1200/anomaly-detection-atlas.git}
      ATLAS_SYNC_INTERVAL: ${ATLAS_SYNC_INTERVAL:-3600}
    volumes:
      - atlas_site:/output

  atlas-docs:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - atlas_site:/usr/share/nginx/html:ro
      - ./anomaly_detection/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - atlas-builder

volumes:
  pg_socket:
  attck_data:
  atlas_site:
  malwaregraph_storage:
  adversarygraph_logs:

networks:
  malwaregraph_internal:
    internal: true
