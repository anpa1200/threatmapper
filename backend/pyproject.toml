[tool.ruff]
target-version = "py312"
line-length = 140

[tool.ruff.lint]
# Keep the new CI lint gate focused on correctness for the current release.
# The repository still has legacy style debt, so broad pycodestyle/pyflakes
# cleanup should be handled as a separate mechanical refactor.
select = ["E9", "F63", "F7", "F82"]
