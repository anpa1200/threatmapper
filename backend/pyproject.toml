[tool.ruff]
target-version = "py312"
line-length = 140

[tool.ruff.lint]
# E9/F6x/F8x: syntax + undefined-name errors (original correctness gate)
# B: flake8-bugbear — catches real bugs (mutable defaults, bare `assert`, etc.)
# ASYNC: flake8-async — catches incorrect async patterns
select = ["E9", "F63", "F7", "F82", "B", "ASYNC"]
ignore = ["B008", "B904"]
