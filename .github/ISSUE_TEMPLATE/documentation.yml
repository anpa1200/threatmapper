name: Documentation issue
description: Report missing, stale, or confusing documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: README.md, docs/quickstart.md, docs/admin-guide.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Suggested fix
