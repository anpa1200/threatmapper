name: Feature request
description: Suggest a product or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Analyst workflow
      description: What CTI or detection workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Current problem
      description: What is difficult or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: What should ThreatMapper do?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence
      description: Link to public docs, reports, examples, or comparable tools if useful.
