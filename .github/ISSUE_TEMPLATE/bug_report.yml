name: Bug report
description: Report a reproducible AdversaryGraph bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps from a clean state.
      placeholder: |
        1. docker compose up
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.9.0 / commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Docker version, browser, LLM provider if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
